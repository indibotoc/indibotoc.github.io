<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Local Text Import</title>
		<style>
			:root {
				color-scheme: light;
				--bg: #f4efe8;
				--panel: #fffaf4;
				--ink: #1f1b16;
				--muted: #6b6258;
				--accent: #7b4b2a;
				--border: rgba(31, 27, 22, 0.12);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background:
					radial-gradient(circle at top, rgba(123, 75, 42, 0.12), transparent 38%),
					linear-gradient(180deg, #fffaf4 0%, var(--bg) 100%);
				color: var(--ink);
				display: grid;
				place-items: center;
				padding: 24px;
			}

			main {
				width: min(920px, 100%);
				background: rgba(255, 250, 244, 0.92);
				border: 1px solid var(--border);
				border-radius: 24px;
				box-shadow: 0 24px 60px rgba(31, 27, 22, 0.1);
				padding: 28px;
				backdrop-filter: blur(10px);
			}

			h1 {
				margin: 0 0 10px;
				font-size: clamp(2rem, 4vw, 3rem);
				line-height: 1.05;
			}

			p {
				margin: 0 0 16px;
				color: var(--muted);
				line-height: 1.6;
			}

			.row {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				align-items: center;
				margin: 18px 0 20px;
			}

			label,
			.button {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				border-radius: 999px;
				border: 1px solid var(--border);
				padding: 12px 16px;
				font-weight: 600;
				background: #fff;
			}

			label {
				cursor: pointer;
				color: var(--ink);
			}

			label:hover,
			.button:hover {
				border-color: rgba(123, 75, 42, 0.35);
			}

			input[type="file"] {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			.hint {
				font-size: 0.95rem;
			}

			.status {
				margin-left: auto;
				color: var(--muted);
				font-size: 0.95rem;
			}

			pre {
				margin: 0;
				min-height: 280px;
				padding: 20px;
				border-radius: 18px;
				border: 1px solid var(--border);
				background: rgba(255, 255, 255, 0.75);
				overflow: auto;
				white-space: pre-wrap;
				word-break: break-word;
				line-height: 1.6;
			}

			@media (max-width: 640px) {
				main {
					padding: 20px;
				}

				.status {
					width: 100%;
					margin-left: 0;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Private local text import</h1>
			<p>
				Pick <strong>test.txt</strong> from your desktop. The file is read in your browser only and is not uploaded anywhere.
			</p>

			<div class="row">
				<label for="fileInput">Choose text file</label>
				<input id="fileInput" type="file" accept=".txt,text/plain" />
				<div class="status" id="status">No file loaded</div>
			</div>

			<p class="hint">Tip: if you want to keep this private, do not commit the text file into this repository.</p>

			<pre id="output">Select a .txt file to preview its contents here.</pre>
		</main>

		<script>
			const fileInput = document.getElementById('fileInput');
			const output = document.getElementById('output');
			const status = document.getElementById('status');

			fileInput.addEventListener('change', () => {
				const file = fileInput.files && fileInput.files[0];

				if (!file) {
					status.textContent = 'No file loaded';
					output.textContent = 'Select a .txt file to preview its contents here.';
					return;
				}

				const reader = new FileReader();

				reader.onload = () => {
					status.textContent = `${file.name} loaded locally`;
					output.textContent = typeof reader.result === 'string' ? reader.result : '';
				};

				reader.onerror = () => {
					status.textContent = 'Could not read file';
					output.textContent = 'The file could not be read.';
				};

				reader.readAsText(file);
			});
		</script>
	</body>
</html>
